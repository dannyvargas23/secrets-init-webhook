apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "secrets-init-webhook.fullname" . }}
  labels:
    {{- include "secrets-init-webhook.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "secrets-init-webhook.fullname" . }}
webhooks:
  - name: webhook.secretsinit.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    reinvocationPolicy: Never
    timeoutSeconds: 10
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    matchConditions:
      - name: has-inject-annotation
        expression: "has(object.metadata.annotations) && 'secretsinit.io/inject' in object.metadata.annotations && object.metadata.annotations['secretsinit.io/inject'] == 'true'"
    clientConfig:
      service:
        name: {{ include "secrets-init-webhook.fullname" . }}
        namespace: {{ .Release.Namespace }}
        path: /mutate
        port: 443
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        operations: ["CREATE"]
        scope: Namespaced
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - {{ .Release.Namespace }}
            {{- range .Values.webhook.excludedNamespaces }}
            - {{ . }}
            {{- end }}
    # objectSelector cannot filter by annotations — only labels.
    # Opt-in is via annotation secretsinit.io/inject: "true" which is
    # checked in the handler. Pods without the annotation pass through untouched.

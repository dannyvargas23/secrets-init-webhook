apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "secrets-init-webhook.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "secrets-init-webhook.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "secrets-init-webhook.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "secrets-init-webhook.labels" . | nindent 4 }}
spec:
  secretName: {{ include "secrets-init-webhook.fullname" . }}-tls
  duration: {{ .Values.tls.duration }}
  renewBefore: {{ .Values.tls.renewBefore }}
  issuerRef:
    name: {{ include "secrets-init-webhook.fullname" . }}
    kind: Issuer
  dnsNames:
    - {{ include "secrets-init-webhook.fullname" . }}.{{ .Release.Namespace }}.svc
    - {{ include "secrets-init-webhook.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local

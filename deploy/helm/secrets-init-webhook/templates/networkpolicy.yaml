# NetworkPolicy — prompt requires: "Use NetworkPolicies to enforce least-privilege
# pod communication — default deny all ingress/egress"
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "secrets-init-webhook.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "secrets-init-webhook.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "secrets-init-webhook.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow the Kubernetes API server to reach the webhook on the HTTPS port.
    # The API server is not pod-scoped so we cannot restrict by namespace selector;
    # restricting by port is the correct approach.
    - ports:
        - port: {{ .Values.webhook.port }}
          protocol: TCP
    # Allow Prometheus scraping of /metrics.
    - ports:
        - port: {{ .Values.webhook.metricsPort }}
          protocol: TCP
  egress:
    # DNS resolution — required for AWS SDK endpoint resolution.
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # EKS Pod Identity Agent — runs on each node at link-local 169.254.170.23.
    # Provides AWS credentials to pods via HTTP (80) and gRPC (2703).
    - to:
        - ipBlock:
            cidr: 169.254.170.23/32
      ports:
        - port: 80
          protocol: TCP
        - port: 2703
          protocol: TCP
    # HTTPS to AWS Secrets Manager and STS.
    - ports:
        - port: 443
          protocol: TCP
